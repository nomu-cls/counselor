<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カウンセラータイプ診断 — あなたのセッションが停滞する本当の理由</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Psychology Colors */
            --amber: #E08A1E;       /* A: 行動・創造・温かさ → 変容の力 */
            --amber-glow: #F5A623;
            --amber-bg: #FFF8EE;
            --amber-gradient: linear-gradient(135deg, #E08A1E, #F5A623);

            --teal: #0D8A72;        /* B: 癒し・調和・深さ → 共感の力 */
            --teal-glow: #1ABC9C;
            --teal-bg: #EEFAF7;
            --teal-gradient: linear-gradient(135deg, #0D8A72, #1ABC9C);

            --indigo: #3D4DB7;      /* C: 知性・信頼・内省 → 分析の力 */
            --indigo-glow: #5C6BC0;
            --indigo-bg: #EEF0FA;
            --indigo-gradient: linear-gradient(135deg, #3D4DB7, #5C6BC0);

            --dark: #0f1923;
            --dark-card: #1a2635;
            --dark-border: #2a3a4d;
            --white: #ffffff;
            --text-soft: #94a3b8;
            --gold: #F5A623;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===================== INTRO ===================== */
        .intro-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            background: radial-gradient(ellipse at 50% 30%, rgba(245,166,35,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(13,138,114,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(61,77,183,0.06) 0%, transparent 50%),
                        var(--dark);
        }
        .intro-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245,166,35,0.15);
            border: 1px solid rgba(245,166,35,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 24px;
            animation: fadeInDown 0.8s ease-out;
        }
        .intro-title {
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        .intro-title .highlight {
            background: linear-gradient(135deg, var(--amber), var(--teal), var(--indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .intro-subtitle {
            font-size: clamp(14px, 2.5vw, 18px);
            color: var(--text-soft);
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        .intro-cards {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
            flex-wrap: wrap;
            justify-content: center;
        }
        .intro-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: left;
            width: 180px;
        }
        .intro-card .ic-icon { font-size: 24px; margin-bottom: 8px; }
        .intro-card .ic-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .intro-card .ic-desc { font-size: 11px; color: var(--text-soft); line-height: 1.5; }

        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--amber), #d4760e);
            color: var(--white);
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            animation: fadeInUp 0.8s ease-out 0.8s both;
            box-shadow: 0 4px 20px rgba(224,138,30,0.3);
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(224,138,30,0.4);
        }
        .intro-note {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-soft);
            animation: fadeInUp 0.8s ease-out 1s both;
        }

        /* ===================== QUIZ ===================== */
        .quiz-screen {
            display: none;
            min-height: 100vh;
            padding: 0 20px;
        }
        .quiz-header {
            position: sticky;
            top: 0;
            background: rgba(15,25,35,0.95);
            backdrop-filter: blur(10px);
            padding: 16px 0;
            z-index: 100;
            border-bottom: 1px solid var(--dark-border);
        }
        .quiz-header-inner {
            max-width: 640px;
            margin: 0 auto;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .progress-label { font-size: 12px; color: var(--text-soft); }
        .progress-num { font-size: 14px; font-weight: 700; color: var(--gold); }
        .progress-bar {
            height: 4px;
            background: var(--dark-card);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--amber-gradient);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .question-container {
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 0 100px;
        }
        .question-slide {
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }
        .question-slide.active { display: block; }
        .q-number {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .q-text {
            font-size: clamp(18px, 3.5vw, 24px);
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: var(--dark-card);
            border: 2px solid var(--dark-border);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        .option-btn:hover {
            border-color: rgba(245,166,35,0.4);
            background: rgba(245,166,35,0.05);
            transform: translateX(4px);
        }
        .option-btn.selected {
            border-color: var(--gold);
            background: rgba(245,166,35,0.1);
        }
        .option-letter {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid var(--dark-border);
            transition: all 0.3s;
        }
        .option-btn.selected .option-letter {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--dark);
        }
        .option-text {
            font-size: 14px;
            line-height: 1.6;
            padding-top: 3px;
        }

        /* ===================== RESULT ===================== */
        .result-screen {
            display: none;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .result-container {
            max-width: 640px;
            margin: 0 auto;
        }
        .result-header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease-out;
        }
        .result-header .small-label {
            font-size: 12px;
            color: var(--text-soft);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .result-header h2 {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 900;
            margin-bottom: 8px;
        }

        .result-card {
            border-radius: 20px;
            padding: 32px 28px;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
            position: relative;
            overflow: hidden;
        }
        .result-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .result-card.type-a { background: var(--dark-card); border: 1px solid rgba(224,138,30,0.3); }
        .result-card.type-a::before { background: var(--amber-gradient); }
        .result-card.type-b { background: var(--dark-card); border: 1px solid rgba(13,138,114,0.3); }
        .result-card.type-b::before { background: var(--teal-gradient); }
        .result-card.type-c { background: var(--dark-card); border: 1px solid rgba(61,77,183,0.3); }
        .result-card.type-c::before { background: var(--indigo-gradient); }

        .result-type-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .result-type-name {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 4px;
        }
        .result-type-sub {
            font-size: 13px;
            color: var(--text-soft);
            margin-bottom: 20px;
        }

        .trait-section {
            margin: 16px 0;
        }
        .trait-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .trait-list {
            list-style: none;
            padding: 0;
        }
        .trait-list li {
            font-size: 13px;
            line-height: 1.7;
            padding: 4px 0 4px 16px;
            position: relative;
            color: #cbd5e1;
        }
        .trait-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-soft);
        }

        .voice-box {
            background: rgba(255,255,255,0.04);
            border-left: 3px solid;
            padding: 14px 16px;
            border-radius: 0 10px 10px 0;
            margin: 16px 0;
            font-size: 13px;
            line-height: 1.7;
            color: #cbd5e1;
        }
        .voice-box .attr {
            font-size: 11px;
            color: var(--text-soft);
            margin-top: 6px;
        }

        .skills-section {
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        .skills-section h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        .skill-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }
        .skill-num {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--dark);
        }
        .skill-info .skill-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .skill-info .skill-desc { font-size: 12px; color: var(--text-soft); line-height: 1.5; }

        .outcome-box {
            background: rgba(245,166,35,0.08);
            border: 1px solid rgba(245,166,35,0.2);
            border-radius: 14px;
            padding: 20px 24px;
            margin: 20px 0;
            text-align: center;
            animation: fadeInUp 0.8s ease-out 0.9s both;
        }
        .outcome-box .label { font-size: 12px; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
        .outcome-box p { font-size: 14px; line-height: 1.8; color: #cbd5e1; }

        .color-note {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            animation: fadeInUp 0.8s ease-out 1.1s both;
        }
        .color-note h4 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
        .color-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; color: var(--text-soft); }
        .color-swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

        .result-cta {
            text-align: center;
            padding: 32px 0;
            animation: fadeInUp 0.8s ease-out 1.2s both;
        }
        .result-cta .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .result-cta .cta-btn:hover { transform: translateY(-2px); }
        .result-cta .cta-sub {
            font-size: 12px;
            color: var(--text-soft);
            margin-top: 12px;
        }
        .retake-btn {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--text-soft);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s;
        }
        .retake-btn:hover { border-color: var(--text-soft); color: var(--white); }

        /* ===================== ANIMATIONS ===================== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245,166,35,0.3); }
            50% { box-shadow: 0 0 0 12px rgba(245,166,35,0); }
        }
        .start-btn { animation: fadeInUp 0.8s ease-out 0.8s both, pulse 2s ease-in-out 2s infinite; }

        /* Hide/show */
        .hidden { display: none !important; }

        @media(max-width:500px) {
            .intro-cards { flex-direction: column; align-items: center; }
            .intro-card { width: 100%; max-width: 280px; }
            .result-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<!-- ====================== INTRO SCREEN ====================== -->
<div class="intro-screen" id="introScreen">
    <div class="intro-badge">🔍 10問・約2分で診断</div>

    <h1 class="intro-title">
        あなたのセッションが<br>
        <span class="highlight">停滞する本当の理由</span>
    </h1>

    <p class="intro-subtitle">
        セッションが停滞するのは、技術の問題ではありません。<br>
        実はあなたの<strong style="color:#fff;">「介入スタイルの癖」</strong>が原因かもしれません。<br><br>
        この診断では、心理学の4大理論をもとに<br>
        あなたのセッションに現れる<strong style="color:#fff;">「壁」のパターン</strong>を明らかにします。
    </p>

    <div class="intro-cards">
        <div class="intro-card">
            <div class="ic-icon">🔶</div>
            <div class="ic-title">伝えられない壁</div>
            <div class="ic-desc">技術はあるのに言葉にできず、価値が届かない</div>
        </div>
        <div class="intro-card">
            <div class="ic-icon">🟢</div>
            <div class="ic-title">深まらない壁</div>
            <div class="ic-desc">傾聴しても核心に触れられず、変化が生まれない</div>
        </div>
        <div class="intro-card">
            <div class="ic-icon">🔵</div>
            <div class="ic-title">選ばれない壁</div>
            <div class="ic-desc">良いセッションなのに、継続やリピートにつながらない</div>
        </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">
        診断をはじめる →
    </button>
    <div class="intro-note">※ 登録不要・無料で診断できます</div>
</div>

<!-- ====================== QUIZ SCREEN ====================== -->
<div class="quiz-screen" id="quizScreen">
    <div class="quiz-header">
        <div class="quiz-header-inner">
            <div class="progress-info">
                <span class="progress-label">カウンセラータイプ診断</span>
                <span class="progress-num" id="progressNum">1 / 10</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:10%"></div>
            </div>
        </div>
    </div>

    <div class="question-container" id="questionContainer">
        <!-- Questions are rendered by JS -->
    </div>
</div>

<!-- ====================== RESULT SCREEN ====================== -->
<div class="result-screen" id="resultScreen">
    <div class="result-container" id="resultContainer">
        <!-- Result is rendered by JS -->
    </div>
</div>

<script>
const questions = [
    {
        q: "セッション後、最もよく感じる「残念感」は？",
        options: [
            { text: "伝えたかったことが相手に届いた手応えがない", type: "a" },
            { text: "深いところまで話せたのに、変化に繋がらなかった", type: "b" },
            { text: "良いセッションだったのに、次の予約が入らない", type: "c" }
        ]
    },
    {
        q: "クライアントとの関係で、最も困ることは？",
        options: [
            { text: "自分の価値やセッションの良さを説明できない", type: "a" },
            { text: "聴けば聴くほど行き詰まって、出口が見えなくなる", type: "b" },
            { text: "信頼はされているのに、お金の話になると距離ができる", type: "c" }
        ]
    },
    {
        q: "新しいクライアントと初めて会うとき、一番の不安は？",
        options: [
            { text: "うまく自分のセッションの価値を伝えられるか", type: "a" },
            { text: "想定外の深い悩みが来たとき、対応できるか", type: "b" },
            { text: "初回で良い印象を与えて、継続につなげられるか", type: "c" }
        ]
    },
    {
        q: "カウンセラー向けの講座に参加するとき、最も求めるのは？",
        options: [
            { text: "自分のやり方を言語化・体系化するヒント", type: "a" },
            { text: "傾聴の先にある「介入」の具体的な技術", type: "b" },
            { text: "集客・リピート・セッション外の設計方法", type: "c" }
        ]
    },
    {
        q: "セッション中に最もストレスを感じる場面は？",
        options: [
            { text: "アドバイスしたいのに、うまい言葉が出てこない", type: "a" },
            { text: "話を聞いているだけで時間が過ぎ、核心に触れられない", type: "b" },
            { text: "良い関わりをしているのに、成果が目に見える形にならない", type: "c" }
        ]
    },
    {
        q: "今の自分に最も欲しいのは？",
        options: [
            { text: "技術を「言葉」にして人に伝える力", type: "a" },
            { text: "「聴く」だけでなく「変化を生む」介入の力", type: "b" },
            { text: "セッション以外で「選ばれる」仕組み", type: "c" }
        ]
    },
    {
        q: "クライアントの反応で、最もがっかりする場面は？",
        options: [
            { text: "一生懸命伝えたのに、全く別のことが印象に残っていた", type: "a" },
            { text: "共感しても「で、どうすればいいんですか？」と言われた", type: "b" },
            { text: "満足してもらえたはずなのに、紹介も継続もなく終わった", type: "c" }
        ]
    },
    {
        q: "自分のセッションの最大の課題は何ですか？",
        options: [
            { text: "感覚的にできていることを「型」や「構造」にできない", type: "a" },
            { text: "傾聴のその先、何をどう「介入」すればいいかわからない", type: "b" },
            { text: "セッション前後のコミュニケーション設計ができていない", type: "c" }
        ]
    },
    {
        q: "理想のカウンセラー像に近いのは？",
        options: [
            { text: "自分の専門性を明確な言葉で表現し、人を導ける人", type: "a" },
            { text: "どんな相手でも深層にアクセスし、変容を起こせる人", type: "b" },
            { text: "「あなたに出会えてよかった」と言われ続ける人", type: "c" }
        ]
    },
    {
        q: "この診断で、最も知りたいことは？",
        options: [
            { text: "なぜ自分の価値が伝わらないのか、その構造的な原因", type: "a" },
            { text: "傾聴が「深まらない」原因と、その先の具体的技術", type: "b" },
            { text: "良いセッションなのに「選ばれない」理由と、その解決策", type: "c" }
        ]
    }
];

const results = {
    a: {
        label: "CLUSTER A",
        name: "「伝えられない」型",
        sub: "行動変容型カウンセラー（パールズ＋エリクソン寄り）",
        color: "var(--amber)",
        colorGlow: "var(--amber-glow)",
        gradient: "var(--amber-gradient)",
        cardClass: "type-a",
        strengths: [
            "実践と体験を通して、クライアントにリアルな変化を起こす力がある",

let currentQ = 0;
let answers = { a: 0, b: 0, c: 0 };

function startQuiz() {
    document.getElementById('introScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    renderQuestions();
    showQuestion(0);
    window.scrollTo(0, 0);
}

function renderQuestions() {
    const container = document.getElementById('questionContainer');
    container.innerHTML = questions.map((q, i) => {
        const shuffled = shuffleOptions(q.options, i);
        return `
        <div class="question-slide" id="q${i}" ${i === 0 ? 'style="display:block"' : ''}>
            <div class="q-number">QUESTION ${String(i + 1).padStart(2, '0')}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">
                ${shuffled.map((opt, j) => `
                    <div class="option-btn" onclick="selectOption(${i}, '${opt.type}', this)">
                        <div class="option-letter">${String.fromCharCode(65 + j)}</div>
                        <div class="option-text">${opt.text}</div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }).join('');
}

function shuffleOptions(options, seed) {
    const arr = [...options];
    // Simple deterministic shuffle based on question index
    for (let i = arr.length - 1; i > 0; i--) {
        const j = (seed * 3 + i * 7) % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function selectOption(qIndex, type, el) {
    // Mark selected
    el.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    answers[type]++;

    // Auto advance after delay
    setTimeout(() => {
        if (qIndex < questions.length - 1) {
            showQuestion(qIndex + 1);
        } else {
            showResult();
        }
    }, 400);
}

function showQuestion(index) {
    currentQ = index;
    document.querySelectorAll('.question-slide').forEach(s => {
        s.style.display = 'none';
        s.classList.remove('active');
    });
    const slide = document.getElementById('q' + index);
    slide.style.display = 'block';
    slide.classList.add('active');

    document.getElementById('progressNum').textContent = `${index + 1} / 10`;
    document.getElementById('progressFill').style.width = ((index + 1) / 10 * 100) + '%';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';

    // Determine type
    let maxType = 'a';
    if (answers.b > answers[maxType]) maxType = 'b';
    if (answers.c > answers[maxType]) maxType = 'c';

    const r = results[maxType];

    container.innerHTML = `

        <div class="result-cta">

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retakeQuiz() {
    answers = { a: 0, b: 0, c: 0 };
    currentQ = 0;
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('introScreen').style.display = 'flex';
    window.scrollTo({ top: 0 });
}
